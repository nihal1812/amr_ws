slam_plumbing_node:
  ros__parameters:
    use_sim_time: true

    ekf:
      sigma_v: 0.05
      sigma_w: 0.20

    slam:
      update_period: 0.2

    map:
      resolution: 0.05
      width: 800
      height: 800
      origin_x: -20.0
      origin_y: -20.0

    mapping:
      l_hit: 0.85
      l_miss: 0.40
      l_min: -5.0
      l_max: 5.0
      map_beam_step: 2

    scan_match:
      enable: true
      beam_step: 8
      occ_thresh: 1.0
      range_margin: 0.10
      min_occupied_cells_to_enable: 500
      min_score_to_accept: 5

      coarse_dx: 0.20
      coarse_dy: 0.20
      coarse_dth_deg: 10.0
      coarse_step_xy: 0.03
      coarse_step_th_deg: 2.0

      fine_dx: 0.06
      fine_dy: 0.06
      fine_dth_deg: 4.0
      fine_step_xy: 0.01
      fine_step_th_deg: 0.5
